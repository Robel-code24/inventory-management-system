services:
  - type: web
    name: tmt-inventory-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./inventory.db
      - key: JWT_SECRET
        generateValue: true
